// ── Parse prompt (shared) ──────────────────────────────────────────────────
const PARSE_PROMPT = `Parse this distributor invoice PDF for a retail feed store. Return ONLY valid JSON, no markdown.

{"invoice_number":"string","ship_date":"string","invoice_total":"string","distributor":"string","items":[{"upc":"string","item_id":"string","description":"string","ord_qty":"string","ship_qty":"string","net_price":"string","extended":"string"}],"cancelled_items":[{"description":"string","ord_qty":"string"}]}

Rules:
- Include ALL shipped items in the items array
- For Newco invoices: ord_qty = ORD QTY column, ship_qty = SHIP QTY column. Items with Cancel in SHIP QTY go in cancelled_items.
- For VSI invoices: ord_qty = QTY OPEN column, ship_qty = SHIP QTY column. Items where SHIP QTY is 0 or blank go in cancelled_items. Skip fuel surcharge and misc charge lines.
- For Phillips Pet Food invoices: The QUANTITY block has two numbers — first is ORDER qty, second is SHIPPED qty. ord_qty = ORDER, ship_qty = SHIPPED. Items where SHIPPED = 0 go in cancelled_items. Descriptions may wrap to a second line — concatenate them into one description. Expand common abbreviations: TOW = Taste of the Wild, DIA NAT = Diamond Naturals, NB LID = Natural Balance Lid, CNNE = Canine, CKN = Chicken, LMB = Lamb, BSN = Bison, VNS = Venison, FELN = Feline, PUP = Puppy, ADLT = Adult, SM BRD = Small Breed, LG BRD = Large Breed, RBBT = Rabbit, ALF = Alfalfa, THAY = Timothy Hay, GF = Grain Free, RC = Rice. Strip notes like "*REPL 404020", "*IF OS USE...", "- This Items Order Quantity Increased to Meet Minimum -". Skip fuel surcharge lines and the Open Recap page (page 4 with account balance summary). Invoice total = ** TOTAL ** value on last invoice page.
- Strip item codes from start of descriptions (e.g. "115174 PINK EYE SPRAY" -> description = "PINK EYE SPRAY 16oz VETERICYN")
- Quantities as numbers only — no "EA", "CS", "PK" suffixes
- distributor field: set to "Newco" if Newco invoice, "VSI" if Veterinary Service Inc invoice, "Phillips" if Phillips Pet Food invoice, otherwise "Other"
- Return ONLY the JSON object, nothing else`;

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("upload");
  // Invoice queue: each entry has { id, filename, status, parsed, vendor, flags, receivedQty, damagedQty, damagePhotos, checkedIn, specials, report, errorMsg, creditEntry }
  const [invoiceQueue, setInvoiceQueue] = useState([]);
  const [activeInvoiceId, setActiveInvoiceId] = useState(null);
  const [lastPrices, setLastPrices] = useState({});
  const [orders, setOrders] = useState(() => { try { return JSON.parse(localStorage.getItem("ff_special_orders_v2")||"[]"); } catch(e) { return []; } });
  const [soForm, setSoForm] = useState({name:"",phone:"",product:"",distributor:"Newco",notes:""});
  const [scanModal, setScanModal] = useState(null);
  const [shortModal, setShortModal] = useState(null);
  const [damageModal, setDamageModal] = useState(null);
  const [shareModal, setShareModal] = useState(false);
  const [addPhotosModal, setAddPhotosModal] = useState(false);
  const [cameraOpen, setCameraOpen] = useState(false);
  const [fuzzyModal, setFuzzyModal] = useState(false);
  const [manualBarcode, setManualBarcode] = useState("");
  const [scanBuffer, setScanBuffer] = useState("");
  const [lastScanTime, setLastScanTime] = useState(0);
  const [scanFlash, setScanFlash] = useState(false);
  const [creditLog, setCreditLog] = useState(() => { try { return JSON.parse(localStorage.getItem("ff_credit_log")||"[]"); } catch(e) { return []; } });
  const fileRef = useRef();

  useEffect(() => {
    const saved = localStorage.getItem("ff_last_prices");
    if (saved) try { setLastPrices(JSON.parse(saved)); } catch(e){}
  }, []);

  // Derived
  const activeInvoice = invoiceQueue.find(inv => inv.id === activeInvoiceId) || null;
  const manifest = activeInvoice?.parsed || null;
  const flags = activeInvoice?.flags || {};
  const receivedQty = activeInvoice?.receivedQty || {};
  const damagedQty = activeInvoice?.damagedQty || {};
  const damagePhotos = activeInvoice?.damagePhotos || {};
  const checkedIn = activeInvoice?.checkedIn || {};
  const specials = activeInvoice?.specials || {};
  const checkedInCount = Object.keys(checkedIn).length;
  const totalItems = manifest?.items?.length || 0;
  const priceChangeCount = manifest?.priceChanges?.length || 0;
  const pendingOrders = orders.filter(o=>o.status==="pending"||(o.status===undefined&&!o.arrived));
  const visibleQueue = invoiceQueue.filter(i=>i.status!=="credit");
  const creditQueue = invoiceQueue.filter(i=>i.status==="credit");
  const queueParsing = invoiceQueue.filter(i=>i.status==="parsing").length;
  const queueReady = invoiceQueue.filter(i=>i.status==="ready").length;
  const queueActive = invoiceQueue.filter(i=>i.status==="active").length;
  const queueDone = invoiceQueue.filter(i=>i.status==="done").length;

  // Update one invoice in queue
  const updateInvoice = useCallback((id, updater) => {
    setInvoiceQueue(prev => prev.map(inv => inv.id === id ? {...inv, ...updater(inv)} : inv));
  }, []);

  // Keyboard scanner
  useEffect(() => {
    const handleKey = (e) => {
      if (tab!=="checkin"||!manifest) return;
      const tag = document.activeElement?.tagName;
      if (tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT") return;
      const now = Date.now();
      if (now-lastScanTime>300) { setScanBuffer(e.key==="Enter"?"":e.key); }
      else { setScanBuffer(prev => { if(e.key==="Enter"&&prev.length>3){handleBarcodeScan(prev);return "";} return prev+e.key; }); }
      setLastScanTime(now);
    };
    window.addEventListener("keydown", handleKey);
    return () => window.removeEventListener("keydown", handleKey);
  }, [tab, manifest, lastScanTime]);

  const handleBarcodeScan = useCallback((barcode) => {
    if (!manifest?.items) return;
    const clean = barcode.trim();
    const idx = manifest.items.findIndex(item =>
      item.upc===clean || item.upc?.replace(/^0+/,"")===clean.replace(/^0+/,"") || item.item_id===clean
    );
    if (idx>=0) { setScanFlash(true); setTimeout(()=>setScanFlash(false),400); setScanModal({item:manifest.items[idx],index:idx}); }
    else { setFuzzyModal(true); }
  }, [manifest]);

  const handleManualScan = () => { if(manualBarcode.trim()){handleBarcodeScan(manualBarcode.trim());setManualBarcode("");} };
  const handleCameraScan = (barcode) => { setCameraOpen(false); handleBarcodeScan(barcode); };

  const handleScanConfirm = (idx, got, expected) => {
    setScanModal(null);
    if (!activeInvoiceId) return;
    updateInvoice(activeInvoiceId, inv => ({
      receivedQty: {...(inv.receivedQty||{}), [idx]: got},
      checkedIn: {...(inv.checkedIn||{}), [idx]: true},
      status: "active",
      flags: {...(inv.flags||{}), [idx]: got<expected ? (inv.flags?.[idx]||"short") : got>expected ? "extra" : null}
    }));
    if (got < expected) setShortModal({item: manifest.items[idx], index: idx, shortage: expected-got});
  };

  const handleShortMissing = () => {
    if (!shortModal||!activeInvoiceId) return;
    updateInvoice(activeInvoiceId, inv => ({flags: {...(inv.flags||{}), [shortModal.index]:"short"}}));
    setShortModal(null);
  };

  const handleShortDamaged = () => {
    if (!shortModal) return;
    const {item,index,shortage} = shortModal;
    setShortModal(null);
    setDamageModal({item, index, prefillCount: shortage});
  };

  const handleDamageConfirm = (idx, dmgCount, total, photos) => {
    setDamageModal(null);
    if (!activeInvoiceId) return;
    updateInvoice(activeInvoiceId, inv => ({
      damagedQty: {...(inv.damagedQty||{}), [idx]: dmgCount},
      damagePhotos: {...(inv.damagePhotos||{}), [idx]: photos},
      flags: {...(inv.flags||{}), [idx]: "damaged"}
    }));
  };

  // ── File ingestion ─────────────────────────────────────────────────────────
  const toBase64 = (file) => new Promise((res,rej)=>{ const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Read failed"));r.readAsDataURL(file); });
  const repairJSON = (text) => {
    let s=text.trim();
    s=s.replace(/,\s*"[^"]*"?\s*:\s*"[^"]*$/,"");s=s.replace(/,\s*"[^"]*"?\s*:\s*$/,"");s=s.replace(/,\s*"[^"]*$/,"");s=s.replace(/,\s*$/,"");
    let opens=0,objs=0;for(const ch of s){if(ch==="[")opens++;else if(ch==="]")opens--;else if(ch==="{")objs++;else if(ch==="}")objs--;}
    while(objs>0){s+="}";objs--;}while(opens>0){s+="]";opens--;}return s;
  };

  // ── Merge same-vendor same-date invoices into one check-in ────────────────
  // Called after all PDFs in a batch finish parsing.
  // Returns the new queue with duplicates collapsed.
  const mergeInvoiceQueue = (queue) => {
    // Group "ready" invoices by vendor+date. Parsing/error/credit/active/done are untouched.
    const mergeable = queue.filter(i => i.status === "ready" && i.parsed);
    const immutable = queue.filter(i => i.status !== "ready" || !i.parsed);

    // Build groups keyed by "vendor|ship_date"
    const groups = {};
    mergeable.forEach(inv => {
      const key = `${inv.parsed.distributor}|${inv.parsed.ship_date}`;
      if (!groups[key]) groups[key] = [];
      groups[key].push(inv);
    });

    const merged = [];
    Object.values(groups).forEach(group => {
      if (group.length === 1) { merged.push(group[0]); return; }

      // Merge all invoices in the group into the first one
      const base = group[0];
      const allInvoiceNums = group.map(inv => inv.parsed.invoice_number).filter(Boolean);

      // Combine items: match by UPC, sum quantities & extended; append unique UPCs
      let combinedItems = [...(base.parsed.items || [])];
      let autoFlags = {...(base.flags || {})};

      group.slice(1).forEach(inv => {
        (inv.parsed.items || []).forEach(newItem => {
          const existIdx = combinedItems.findIndex(ci =>
            ci.upc && newItem.upc && ci.upc === newItem.upc
          );
          if (existIdx >= 0) {
            // Same UPC — combine quantities
            const existing = combinedItems[existIdx];
            combinedItems[existIdx] = {
              ...existing,
              ship_qty: String((parseInt(existing.ship_qty)||0) + (parseInt(newItem.ship_qty)||0)),
              ord_qty:  String((parseInt(existing.ord_qty)||0)  + (parseInt(newItem.ord_qty)||0)),
              extended: String(((parseFloat(existing.extended)||0) + (parseFloat(newItem.extended)||0)).toFixed(2)),
              // tag which invoice numbers this item came from (for email breakdown)
              _invoices: [...(existing._invoices || [existing._fromInvoice || base.parsed.invoice_number]), newItem.invoice_number || inv.parsed.invoice_number].filter(Boolean),
            };
            // Re-evaluate short flag after combining
            const combined = combinedItems[existIdx];
            if (parseInt(combined.ord_qty) > parseInt(combined.ship_qty)) {
              autoFlags[existIdx] = "short";
            } else {
              if (autoFlags[existIdx] === "short") delete autoFlags[existIdx];
            }
          } else {
            // New UPC — append, tag with source invoice
            const newIdx = combinedItems.length;
            combinedItems.push({
              ...newItem,
              _invoices: [newItem.invoice_number || inv.parsed.invoice_number].filter(Boolean),
            });
            if (parseInt(newItem.ord_qty) > parseInt(newItem.ship_qty)) autoFlags[newIdx] = "short";
          }
        });
      });

      // Tag base items with their source invoice too
      combinedItems = combinedItems.map((item, i) => ({
        ...item,
        _invoices: item._invoices || [base.parsed.invoice_number].filter(Boolean),
      }));

      // Pool cancelled items
      const allCancelled = group.flatMap(inv => inv.parsed.cancelled_items || []);

      // Combine invoice totals
      const combinedTotal = group.reduce((sum, inv) => sum + (parseFloat(inv.parsed.invoice_total)||0), 0).toFixed(2);

      // Merge price changes — dedup by UPC, keep largest change
      const pcMap = {};
      group.forEach(inv => {
        (inv.parsed.priceChanges || []).forEach(pc => {
          if (!pcMap[pc.upc] || parseFloat(pc.change) > parseFloat(pcMap[pc.upc].change)) {
            pcMap[pc.upc] = pc;
          }
        });
      });

      const mergedEntry = {
        ...base,
        parsed: {
          ...base.parsed,
          invoice_number: allInvoiceNums[0],       // kept for legacy compat
          invoice_numbers: allInvoiceNums,          // NEW: full list
          invoice_total: combinedTotal,
          items: combinedItems,
          cancelled_items: allCancelled,
          priceChanges: Object.values(pcMap),
          _merged: true,
          _sourceCount: group.length,
        },
        flags: autoFlags,
      };

      merged.push(mergedEntry);
    });

    // Preserve original order: put merged entries where the first of the group was
    const finalQueue = [...immutable, ...merged];
    // Re-sort by original insertion order (immutable items first is fine; merged replaces group[0])
    return finalQueue;
  };

  const parseOneInvoice = async (invoiceId, b64, pricesSnapshot) => {
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json","x-api-key":"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","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:8000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:PARSE_PROMPT}]}]})
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error?.message||"API error");
      let raw = data.content.map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
      let parsed;
      try { parsed=JSON.parse(raw); } catch(e1) { try { parsed=JSON.parse(repairJSON(raw)); } catch(e2) { throw new Error("Could not parse invoice."); } }

      // Credit memo detection (triple-redundant)
      const rawUpper = raw.toUpperCase();
      const totalNum = parseFloat(parsed.invoice_total)||0;
      const allNegativeQty = (parsed.items||[]).length>0 && (parsed.items||[]).every(item=>parseFloat(item.ship_qty)<0||parseFloat(item.ord_qty)<0);
      const isCreditMemo = rawUpper.includes("CREDIT MEMO")||totalNum<0||allNegativeQty;

      if (isCreditMemo) {
        const creditItems = (parsed.items||[]).map(item=>({...item, ship_qty:String(Math.abs(parseFloat(item.ship_qty)||0)), ord_qty:String(Math.abs(parseFloat(item.ord_qty)||0)), extended:String(Math.abs(parseFloat(item.extended)||0))}));
        const creditEntry = { id:Date.now().toString()+Math.random(), vendor:parsed.distributor||"Unknown", invoice_number:parsed.invoice_number, date:parsed.ship_date||new Date().toLocaleDateString(), program:parsed.customer_po||"", items:creditItems, total:Math.abs(totalNum).toFixed(2), loggedAt:new Date().toISOString() };
        setCreditLog(prev => { const updated=[creditEntry,...prev]; localStorage.setItem("ff_credit_log",JSON.stringify(updated)); return updated; });
        updateInvoice(invoiceId, ()=>({status:"credit",vendor:parsed.distributor||"Unknown",creditEntry,parsed}));
        return {type:"credit"};
      }

      // Price changes
      const newPriceUpdates = {};
      const priceChanges = [];
      (parsed.items||[]).forEach(item=>{
        if(!item.upc) return;
        const current=parseFloat(item.net_price)||0;
        const previous=pricesSnapshot[item.upc];
        if(previous&&current>previous) priceChanges.push({description:item.description,upc:item.upc,previous:previous.toFixed(2),current:current.toFixed(2),change:(current-previous).toFixed(2),pct:(((current-previous)/previous)*100).toFixed(1)});
        newPriceUpdates[item.upc]=current;
      });

      // Auto-flag shorts
      const autoFlags={};
      (parsed.items||[]).forEach((item,i)=>{ if(parseInt(item.ord_qty)>parseInt(item.ship_qty)) autoFlags[i]="short"; });

      updateInvoice(invoiceId, ()=>({status:"ready",vendor:parsed.distributor||"Unknown",parsed:{...parsed,priceChanges},flags:autoFlags,receivedQty:{},damagedQty:{},damagePhotos:{},checkedIn:{},specials:{},report:null}));
      return {type:"invoice",priceUpdates:newPriceUpdates};
    } catch(e) {
      updateInvoice(invoiceId, ()=>({status:"error",errorMsg:e.message}));
      return {type:"error"};
    }
  };

  const handleFiles = async (files) => {
    const pdfs = Array.from(files).filter(f=>f.type==="application/pdf");
    if(pdfs.length===0) return;

    const newEntries = pdfs.map(file=>({
      id: Date.now().toString()+Math.random().toString(36).slice(2),
      filename: file.name, status:"parsing", parsed:null, vendor:null,
      flags:{}, receivedQty:{}, damagedQty:{}, damagePhotos:{}, checkedIn:{}, specials:{}, report:null, errorMsg:null, creditEntry:null,
    }));

    setInvoiceQueue(prev=>[...prev,...newEntries]);

    const pricesSnapshot = {...lastPrices};
    const b64Results = await Promise.all(pdfs.map(f=>toBase64(f)));
    const parseResults = await Promise.all(newEntries.map((entry,i)=>parseOneInvoice(entry.id,b64Results[i],pricesSnapshot)));

    const allPriceUpdates={};
    parseResults.forEach(r=>{ if(r.type==="invoice"&&r.priceUpdates) Object.assign(allPriceUpdates,r.priceUpdates); });
    if(Object.keys(allPriceUpdates).length>0) {
      setLastPrices(prev=>{ const updated={...prev,...allPriceUpdates}; localStorage.setItem("ff_last_prices",JSON.stringify(updated)); return updated; });
    }

    // Auto-merge same-vendor same-date invoices into one check-in
    setInvoiceQueue(prev => mergeInvoiceQueue(prev));
  };

  const selectInvoice = (id) => {
    const inv = invoiceQueue.find(i=>i.id===id);
    if(!inv||inv.status==="parsing"||inv.status==="error"||inv.status==="credit") return;
    setActiveInvoiceId(id);
    if(inv.status==="ready") updateInvoice(id,()=>({status:"active"}));
    setTab("checkin");
  };

  const removeFromQueue = (id) => {
    setInvoiceQueue(prev=>prev.filter(inv=>inv.id!==id));
    if(activeInvoiceId===id) { setActiveInvoiceId(null); setTab("upload"); }
  };

  const toggleFlag = (i, type) => {
    if(!activeInvoiceId) return;
    updateInvoice(activeInvoiceId, inv=>({flags:{...(inv.flags||{}),[i]:inv.flags?.[i]===type?null:type}}));
  };
  const toggleSpecial = (i, checked) => {
    if(!activeInvoiceId) return;
    updateInvoice(activeInvoiceId, inv=>({specials:{...(inv.specials||{}),[i]:checked}}));
  };

  // ── Generate report for active invoice ────────────────────────────────────
  const generateReport = () => {
    if(!activeInvoice||!manifest?.items?.length) return;
    const items=manifest.items;
    const flaggedItems=[],specialItems=[],shelfItems=[];
    items.forEach((item,i)=>{
      const entry={item,i,flag:flags[i]||null,actualQty:receivedQty[i]!==undefined?receivedQty[i]:parseInt(item.ship_qty),checkedIn:!!checkedIn[i],dmgCount:damagedQty[i]||0,photos:damagePhotos[i]||[]};
      if(flags[i]) flaggedItems.push(entry);
      if(specials[i]) specialItems.push(entry); else shelfItems.push(entry);
    });
    const cancelled=manifest?.cancelled_items||[];
    const priceChanges=manifest?.priceChanges||[];
    const today=new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
    const isMerged = manifest?.invoice_numbers?.length > 1;
    const invoiceNums = manifest?.invoice_numbers || [manifest?.invoice_number];
    const invoiceLabel = isMerged ? `Invoices #${invoiceNums.join(", #")}` : `Invoice #${invoiceNums[0]}`;

    const short=flaggedItems.filter(x=>x.flag==="short");
    const damaged=flaggedItems.filter(x=>x.flag==="damaged");
    const wrong=flaggedItems.filter(x=>x.flag==="wrong");
    const hasIssues = short.length||damaged.length||wrong.length;

    let vendorEmail=`Hi,\n\nPlease see the following exceptions from our delivery today (${today}), ${invoiceLabel}:\n\n`;

    if (isMerged && hasIssues) {
      // Group flagged items by source invoice number, emit one section per invoice
      invoiceNums.forEach(invNum => {
        const invShort  = short.filter(x  => (x.item._invoices||[invoiceNums[0]]).includes(invNum));
        const invDamaged= damaged.filter(x => (x.item._invoices||[invoiceNums[0]]).includes(invNum));
        const invWrong  = wrong.filter(x  => (x.item._invoices||[invoiceNums[0]]).includes(invNum));
        if (!invShort.length && !invDamaged.length && !invWrong.length) return;
        vendorEmail += `--- Invoice #${invNum} ---\n`;
        if(invShort.length){vendorEmail+=`SHORT SHIPPED:\n`;invShort.forEach(x=>{const act=receivedQty[x.i]!==undefined?receivedQty[x.i]:parseInt(x.item.ship_qty);vendorEmail+=`  • ${x.item.description} — invoice says ${x.item.ship_qty}, received ${act}\n`;});vendorEmail+="\n";}
        if(invDamaged.length){vendorEmail+=`DAMAGED ON ARRIVAL:\n`;invDamaged.forEach(x=>{const p=damagePhotos[x.i]||[];vendorEmail+=`  • ${x.item.description} — ${x.dmgCount} of ${x.item.ship_qty} bag${parseInt(x.item.ship_qty)!==1?"s":""} damaged${p.length>0?` (${p.length} photo${p.length>1?"s":""} attached)`:""}\n`;});vendorEmail+="\n";}
        if(invWrong.length){vendorEmail+=`WRONG ITEM RECEIVED:\n`;invWrong.forEach(x=>{vendorEmail+=`  • ${x.item.description}\n`;});vendorEmail+="\n";}
      });
    } else {
      // Single invoice — flat format
      if(short.length){vendorEmail+=`SHORT SHIPPED:\n`;short.forEach(x=>{const act=receivedQty[x.i]!==undefined?receivedQty[x.i]:parseInt(x.item.ship_qty);vendorEmail+=`  • ${x.item.description} — invoice says ${x.item.ship_qty}, received ${act}\n`;});vendorEmail+="\n";}
      if(damaged.length){vendorEmail+=`DAMAGED ON ARRIVAL:\n`;damaged.forEach(x=>{const p=damagePhotos[x.i]||[];vendorEmail+=`  • ${x.item.description} — ${x.dmgCount} of ${x.item.ship_qty} bag${parseInt(x.item.ship_qty)!==1?"s":""} damaged${p.length>0?` (${p.length} photo${p.length>1?"s":""} attached)`:""}\n`;});vendorEmail+="\n";}
      if(wrong.length){vendorEmail+=`WRONG ITEM RECEIVED:\n`;wrong.forEach(x=>{vendorEmail+=`  • ${x.item.description}\n`;});vendorEmail+="\n";}
    }
    if(hasIssues) vendorEmail+=`Please advise on credit or replacement.\n\nThank you,\nFoothill Feed\n3293 Taylor Rd, Loomis CA 95650\n(916) 652-7121\norders@foothillfeedloomis.com`;

    let priceEmail="";
    if(priceChanges.length>0){
      priceEmail=`Hi Jeff,\n\nThe following items had price increases on today's delivery (${today}), ${invoiceLabel}. Please update retail pricing before these items go on the shelf:\n\n`;
      priceChanges.forEach(pc=>{priceEmail+=`  • ${pc.description}\n    Previous cost: $${pc.previous} → New cost: $${pc.current} (+$${pc.change} / +${pc.pct}%)\n\n`;});
      priceEmail+=`Please review and update shelf prices accordingly.\n\nFoothill Feed Delivery System`;
    }
    const reportData={items,flaggedItems,specialItems,shelfItems,cancelled,priceChanges,vendorEmail,priceEmail,today,invoiceLabel,isMerged,invoiceNums};
    updateInvoice(activeInvoiceId,()=>({report:reportData,status:"done"}));
    setTab("report");
  };

  // ── Special orders ─────────────────────────────────────────────────────────
  const addOrder = () => {
    if(!soForm.name||!soForm.product) return;
    const newOrder={id:Date.now().toString(),customerName:soForm.name,phone:soForm.phone,email:"",product:soForm.product,distributor:soForm.distributor,notes:soForm.notes,depositTaken:false,depositAmount:"",status:"pending",deadlineDate:null,createdAt:new Date().toISOString(),createdBy:"Staff",arrivedAt:null};
    const updated=[newOrder,...orders]; setOrders(updated); localStorage.setItem("ff_special_orders_v2",JSON.stringify(updated));
    setSoForm({name:"",phone:"",product:"",distributor:"Newco",notes:""});
  };
  const deleteOrder=(id)=>{ const u=orders.filter(o=>o.id!==id); setOrders(u); localStorage.setItem("ff_special_orders_v2",JSON.stringify(u)); };
  const markArrived=(id)=>{ const u=orders.map(o=>o.id===id?{...o,status:"arrived",arrivedAt:new Date().toISOString()}:o); setOrders(u); localStorage.setItem("ff_special_orders_v2",JSON.stringify(u)); };

  const getSession=()=>({invoice_number:manifest?.invoice_number,ship_date:manifest?.ship_date,invoice_total:manifest?.invoice_total,distributor:manifest?.distributor,items:manifest?.items||[],cancelled_items:manifest?.cancelled_items||[],priceChanges:manifest?.priceChanges||[],flags,receivedQty,damagedQty,damagePhotos,checkedIn,specials});

  // ── Styles ─────────────────────────────────────────────────────────────────
  const tabSty=(t)=>({padding:"12px 16px",fontSize:13,fontWeight:500,color:tab===t?GREEN:"#888",cursor:"pointer",borderBottom:tab===t?`2px solid ${GREEN}`:"2px solid transparent",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"});
  const card={background:"white",border:"1px solid #ddd8d0",borderRadius:10,boxShadow:"0 2px 10px rgba(0,0,0,0.06)",overflow:"hidden",marginBottom:16};
  const cardH={padding:"13px 18px",borderBottom:"1px solid #ddd8d0",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#faf8f4"};
  const btn=(bg,color,border="none")=>({padding:"8px 16px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",background:bg,color,border,fontFamily:"inherit",display:"inline-flex",alignItems:"center",gap:5});
  const inp={width:"100%",padding:"9px 12px",border:"1px solid #ddd",borderRadius:8,fontSize:14,fontFamily:"inherit",background:"white",outline:"none"};
  const th={background:GREEN,color:"white",padding:"9px 12px",textAlign:"left",fontSize:11,textTransform:"uppercase",letterSpacing:"0.05em"};
  const td={padding:"9px 12px",borderBottom:"1px solid #eee",verticalAlign:"middle",fontSize:13};

  const activeReport = activeInvoice?.report || null;
  const switchableInvoices = visibleQueue.filter(i=>i.status==="ready"||i.status==="active"||i.status==="done");
  const doneInvoices = invoiceQueue.filter(i=>i.status==="done");

  return (
    <div style={{fontFamily:"system-ui,sans-serif",background:"#faf8f4",minHeight:"100vh",color:"#1a1a1a"}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}*{box-sizing:border-box}tr:hover td{background:#fdfcfb}`}</style>

      {cameraOpen&&<CameraScanner onScan={handleCameraScan} onClose={()=>setCameraOpen(false)}/>}
      {fuzzyModal&&<FuzzySearchModal manifest={manifest} onSelect={(item,i)=>{setFuzzyModal(false);setScanModal({item,index:i});}} onClose={()=>setFuzzyModal(false)}/>}
      {scanModal&&<ScanModal item={scanModal.item} itemIndex={scanModal.index} onConfirm={handleScanConfirm} onClose={()=>setScanModal(null)}/>}
      {shortModal&&<ShortReasonModal item={shortModal.item} itemIndex={shortModal.index} shortage={shortModal.shortage} onMissing={handleShortMissing} onDamaged={handleShortDamaged} onClose={()=>setShortModal(null)}/>}
      {damageModal&&<DamageModal item={damageModal.item} itemIndex={damageModal.index} prefillCount={damageModal.prefillCount} onConfirm={handleDamageConfirm} onClose={()=>setDamageModal(null)}/>}
      {shareModal&&<ShareSessionModal session={getSession()} onClose={()=>setShareModal(false)}/>}
      {addPhotosModal&&manifest&&<AddPhotosModal session={{...getSession(),items:manifest.items}} onSave={(newPhotos)=>{updateInvoice(activeInvoiceId,()=>({damagePhotos:newPhotos}));setAddPhotosModal(false);}} onClose={()=>setAddPhotosModal(false)}/>}

      {/* Header */}
      <div style={{background:scanFlash?"#5a9e66":GREEN,color:"white",padding:"13px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",transition:"background 0.2s"}}>
        <div style={{fontSize:18,fontWeight:800}}>🌾 Foothill Feed <span style={{opacity:0.55,fontSize:13,fontWeight:400,marginLeft:8}}>Delivery Day</span></div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {queueParsing>0&&<div style={{fontSize:12,background:"rgba(255,255,255,0.15)",padding:"3px 10px",borderRadius:20,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
            <span style={{display:"inline-block",width:8,height:8,border:"1.5px solid rgba(255,255,255,0.5)",borderTopColor:"white",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
            {queueParsing} parsing
          </div>}
          {queueReady>0&&<div style={{fontSize:12,background:"#4a7fc4",padding:"3px 10px",borderRadius:20,fontWeight:600}}>{queueReady} ready</div>}
          {tab==="checkin"&&manifest&&<div style={{fontSize:12,opacity:0.8,fontFamily:"monospace"}}>📡 {checkedInCount}/{totalItems} checked</div>}
          {priceChangeCount>0&&<div style={{fontSize:12,background:"#b8860b",padding:"3px 10px",borderRadius:20,fontWeight:600}}>⚠ {priceChangeCount} price change{priceChangeCount>1?"s":""}</div>}
          <div style={{fontSize:12,opacity:0.7,fontFamily:"monospace"}}>{new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"})}</div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:"white",borderBottom:"1px solid #ddd8d0",display:"flex",padding:"0 16px",gap:2,overflowX:"auto"}}>
        {[
          ["upload","📦 Invoices",visibleQueue.length>0?visibleQueue.length:null],
          ["checkin","✅ Check-In",manifest?.items?.length||null],
          ["orders","⭐ Special Orders",pendingOrders.length],
          ["report","📋 Report",null],
          ["credits","💳 Credits",creditLog.length||null]
        ].map(([key,label,count])=>(
          <div key={key} style={tabSty(key)} onClick={()=>setTab(key)}>
            {label}{count>0&&<span style={{background:GREEN,color:"white",fontSize:10,padding:"2px 6px",borderRadius:10,marginLeft:2}}>{count}</span>}
          </div>
        ))}
      </div>

      <div style={{maxWidth:1060,margin:"0 auto",padding:"20px 16px"}}>

        {/* ══ INVOICES ══ */}
        {tab==="upload"&&<>
          <div style={card}>
            <div style={cardH}>
              <span style={{fontSize:16,fontWeight:700,color:GREEN}}>Upload Invoices</span>
              <span style={{fontSize:12,color:"#888"}}>Drop one or many PDFs — all parse at the same time</span>
            </div>
            <div style={{padding:18}}>
              <div
                onClick={()=>fileRef.current.click()}
                onDragOver={e=>e.preventDefault()}
                onDrop={e=>{e.preventDefault();handleFiles(e.dataTransfer.files);}}
                style={{border:"2px dashed #c2d9c5",borderRadius:10,padding:"36px 24px",textAlign:"center",cursor:"pointer",background:"#eef4ef"}}
              >
                <div style={{fontSize:36,marginBottom:10}}>📄 📄 📄</div>
                <div style={{fontSize:17,fontWeight:700,color:GREEN,marginBottom:5}}>Drop invoice PDFs here — one or many at once</div>
                <div style={{fontSize:13,color:"#666"}}>Newco · VSI · Phillips · All parse in parallel · Credit memos auto-routed</div>
                <input ref={fileRef} type="file" accept=".pdf" multiple style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
              </div>
            </div>
          </div>

          {/* Invoice queue */}
          {visibleQueue.length>0&&(
            <div style={card}>
              <div style={cardH}>
                <div style={{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap"}}>
                  <span style={{fontSize:16,fontWeight:700,color:GREEN}}>Today's Invoices</span>
                  <span style={{fontSize:12,color:"#888"}}>
                    {[queueParsing>0&&`${queueParsing} parsing`,queueReady>0&&`${queueReady} ready`,queueActive>0&&`${queueActive} in progress`,queueDone>0&&`${queueDone} done`].filter(Boolean).join(" · ")}
                  </span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  {queueDone>0&&<button style={{...btn("white","#aaa","1px solid #ddd"),fontSize:12}} onClick={()=>setInvoiceQueue(prev=>prev.filter(i=>i.status!=="done"&&i.status!=="error"))}>Clear Finished</button>}
                  <button style={{...btn("white",RED,"1px solid "+RED),fontSize:12}} onClick={()=>{if(window.confirm("Clear all invoices from today's queue?")){setInvoiceQueue([]);setActiveInvoiceId(null);}}}>Clear All</button>
                </div>
              </div>
              <div style={{padding:"12px 16px",display:"flex",flexDirection:"column",gap:8}}>
                {visibleQueue.map(inv=>(
                  <InvoiceQueueCard key={inv.id} inv={inv} isActive={inv.id===activeInvoiceId} onSelect={selectInvoice} onRemove={removeFromQueue}/>
                ))}
              </div>
            </div>
          )}

          {/* Credit memo intercept cards */}
          {creditQueue.map(inv=>(
            <div key={inv.id} style={{...card,border:"2px solid #4a90a4"}}>
              <div style={{background:"#e8f4f8",borderBottom:"2px solid #4a90a4",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <span style={{fontSize:26}}>💳</span>
                  <div>
                    <div style={{fontSize:15,fontWeight:800,color:"#2c6e8a"}}>Credit Memo — {inv.vendor} #{inv.creditEntry?.invoice_number}</div>
                    <div style={{fontSize:13,color:"#4a7f96",marginTop:2}}>Logged to Credits tab · No delivery action needed</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setTab("credits")} style={{...btn("#4a90a4","white"),fontSize:12}}>View Credits →</button>
                  <button onClick={()=>removeFromQueue(inv.id)} style={{...btn("white","#aaa","1px solid #ddd"),fontSize:12}}>Dismiss</button>
                </div>
              </div>
              <div style={{padding:"10px 20px",display:"flex",gap:16,fontSize:13,flexWrap:"wrap"}}>
                {[["Vendor",inv.creditEntry?.vendor],["Invoice #",inv.creditEntry?.invoice_number],["Date",inv.creditEntry?.date],["Credit Amount","$"+inv.creditEntry?.total]].map(([label,val])=>(
                  <div key={label}><span style={{color:"#aaa",marginRight:4}}>{label}:</span><strong style={{color:"#2c6e8a"}}>{val}</strong></div>
                ))}
              </div>
            </div>
          ))}

          {/* Empty state */}
          {visibleQueue.length===0&&creditQueue.length===0&&(
            <div style={card}>
              <div style={cardH}><span style={{fontSize:16,fontWeight:700,color:GREEN}}>How it works</span></div>
              <div style={{padding:18,display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,textAlign:"center"}}>
                {[["📄📄","1. Drop PDFs","One or many at once — all vendors"],["🤖","2. AI reads all","Parallel parsing · Credits auto-routed"],["📡","3. Pick & check","Choose any invoice to start check-in"],["📋","4. Report per invoice","Each vendor gets its own email & report"]].map(([icon,t,d])=>(
                  <div key={t} style={{padding:14}}><div style={{fontSize:28,marginBottom:8}}>{icon}</div><div style={{fontWeight:700,marginBottom:4,fontSize:13}}>{t}</div><div style={{fontSize:12,color:"#888"}}>{d}</div></div>
                ))}
              </div>
            </div>
          )}
        </>}

        {/* ══ CHECK-IN ══ */}
        {tab==="checkin"&&<>
          {!manifest?(
            <div style={{textAlign:"center",padding:"48px 24px",color:"#888"}}>
              <div style={{fontSize:36}}>📦</div>
              <h3 style={{marginTop:10}}>No invoice selected</h3>
              <p>Go to Invoices tab and click ▶ Start on an invoice</p>
              <button style={{...btn(GREEN,"white"),marginTop:16}} onClick={()=>setTab("upload")}>← Go to Invoices</button>
            </div>
          ):<>
            {/* Invoice switcher — shows when 2+ invoices are workable */}
            {switchableInvoices.length>1&&(
              <div style={{background:"white",border:"1px solid #ddd8d0",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <span style={{fontSize:12,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",flexShrink:0}}>Switch invoice:</span>
                {switchableInvoices.map(inv=>(
                  <button key={inv.id} onClick={()=>selectInvoice(inv.id)}
                    style={{padding:"5px 12px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",
                      background:inv.id===activeInvoiceId?VENDOR_COLORS[inv.vendor]||GREEN:"white",
                      color:inv.id===activeInvoiceId?"white":"#555",
                      border:`1px solid ${inv.id===activeInvoiceId?VENDOR_COLORS[inv.vendor]||GREEN:"#ddd"}`,fontFamily:"inherit"}}>
                    {inv.parsed?.distributor||inv.vendor} #{inv.parsed?.invoice_number}
                    {inv.status==="done"&&" ✓"}
                    {inv.status==="active"&&" ▶"}
                  </button>
                ))}
              </div>
            )}

            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
              {[["Invoice #",manifest.invoice_numbers?.length>1?manifest.invoice_numbers.join(", #"):manifest.invoice_number],["Ship Date",manifest.ship_date],["Items",manifest.items?.length],["Invoice Total","$"+manifest.invoice_total]].map(([label,val])=>(
                <div key={label} style={{background:"#eef4ef",border:"1px solid #c2d9c5",borderRadius:8,padding:"10px 14px"}}>
                  <div style={{fontSize:10,color:"#888",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:3}}>{label}</div>
                  <div style={{fontSize:15,fontWeight:700,color:GREEN,fontFamily:"monospace"}}>{val}</div>
                </div>
              ))}
            </div>

            {priceChangeCount>0&&(
              <div style={{background:"#fff8e1",border:"1px solid #f0c040",borderRadius:10,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>💰</span>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color:"#b8860b"}}>{priceChangeCount} price increase{priceChangeCount>1?"s":""} detected on this delivery</div>
                  <div style={{fontSize:12,color:"#888",marginTop:2}}>See Report tab for full details · Items flagged below</div>
                </div>
              </div>
            )}

            {/* Scanner bar */}
            <div style={{background:"white",border:"1px solid #ddd8d0",borderRadius:10,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <span style={{fontSize:18}}>📡</span>
              <div style={{fontSize:13,fontWeight:600,color:GREEN}}>Barcode Scanner</div>
              <div style={{fontSize:12,color:"#888",flex:1,minWidth:120}}>USB auto-detects · camera or manual below</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <button onClick={()=>setCameraOpen(true)} style={{...btn("#eef4ef",GREEN,`1px solid #c2d9c5`)}}>📷 Camera</button>
                <button onClick={()=>setFuzzyModal(true)} style={{...btn("#fdf4eb",AMBER,`1px solid #f0c070`)}}>🔍 Not on invoice?</button>
                <input placeholder="Type UPC..." value={manualBarcode} onChange={e=>setManualBarcode(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")handleManualScan();}}
                  style={{padding:"7px 10px",border:"1px solid #ddd",borderRadius:8,fontSize:13,fontFamily:"monospace",width:150,outline:"none"}}/>
                <button onClick={handleManualScan} style={btn(GREEN,"white")}>Look Up</button>
              </div>
            </div>

            {/* Progress bar */}
            {totalItems>0&&(
              <div style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#888",marginBottom:4}}>
                  <span>Check-in progress</span><span>{checkedInCount} of {totalItems} confirmed</span>
                </div>
                <div style={{background:"#eee",borderRadius:99,height:6}}>
                  <div style={{background:GREEN,height:6,borderRadius:99,width:`${totalItems>0?(checkedInCount/totalItems)*100:0}%`,transition:"width 0.3s"}}/>
                </div>
              </div>
            )}

            <div style={card}>
              <div style={cardH}>
                <span style={{fontSize:16,fontWeight:700,color:VENDOR_COLORS[manifest.distributor]||GREEN}}>
                  {manifest.distributor} — {manifest.invoice_numbers?.length>1 ? `Invoices #${manifest.invoice_numbers.join(", #")}` : `Invoice #${manifest.invoice_number}`}
                </span>
                <div style={{display:"flex",gap:8}}>
                  <button style={btn("white",GREEN,`1px solid ${GREEN}`)} onClick={()=>updateInvoice(activeInvoiceId,()=>({flags:{},receivedQty:{},checkedIn:{},damagedQty:{},damagePhotos:{}}))}>Reset</button>
                  <button style={btn("white","#b8860b",`1px solid #b8860b`)} onClick={()=>setShareModal(true)}>📱 Add Photos on iPad</button>
                  <button style={btn(GREEN,"white")} onClick={generateReport}>Generate Report →</button>
                </div>
              </div>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr>{["","Product","Invoice","Received","Status","Issue Flag","Special?"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
                  <tbody>
                    {manifest.items.map((item,i)=>{
                      const invoiceQty=parseInt(item.ship_qty)||0;
                      const actualQty=receivedQty[i]!==undefined?receivedQty[i]:invoiceQty;
                      const isChecked=!!checkedIn[i];
                      const flag=flags[i];
                      const diff=actualQty-invoiceQty;
                      const photoCount=(damagePhotos[i]||[]).length;
                      const priceChange=(manifest.priceChanges||[]).find(pc=>pc.upc===item.upc);
                      const matched=orders.find(o=>o.status!=="arrived"&&(o.product||o.name||"").toLowerCase().split(" ").some(w=>w.length>3&&item.description.toLowerCase().includes(w)));
                      return(
                        <tr key={i} style={{background:isChecked?"#f6fbf6":i%2===0?"white":"#fdfcfb"}}>
                          <td style={{...td,width:36,textAlign:"center"}}>
                            {isChecked?<span style={{color:GREEN,fontSize:16}}>✓</span>
                              :<button onClick={()=>setScanModal({item,index:i})} style={{background:"none",border:"1px solid #ddd",borderRadius:6,cursor:"pointer",fontSize:11,padding:"3px 7px",color:"#888"}}>check</button>}
                          </td>
                          <td style={td}>
                            <div style={{fontWeight:600}}>{item.description}</div>
                            <div style={{display:"flex",gap:6,marginTop:3,flexWrap:"wrap"}}>
                              <span style={{fontFamily:"monospace",fontSize:11,color:"#aaa"}}>{item.upc}</span>
                              {priceChange&&<span style={{fontSize:11,background:"#fff8e1",color:"#b8860b",padding:"1px 6px",borderRadius:10,fontWeight:600}}>💰 +${priceChange.change} price increase</span>}
                            </div>
                          </td>
                          <td style={{...td,fontFamily:"monospace",fontWeight:600}}>{item.ship_qty}</td>
                          <td style={{...td,fontFamily:"monospace"}}>
                            {isChecked?<span style={{color:diff<0?RED:diff>0?PURPLE:GREEN,fontWeight:700}}>{actualQty}</span>:"—"}
                          </td>
                          <td style={td}>
                            {isChecked
                              ?diff<0?<Badge type="short">Short {Math.abs(diff)}</Badge>:diff>0?<Badge type="extra">+{diff} extra</Badge>:<Badge type="ok">✓ Match</Badge>
                              :<Badge type="ok">Expected {item.ship_qty}</Badge>}
                          </td>
                          <td style={td}>
                            <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                              <button onClick={()=>{ if(flag==="damaged"){updateInvoice(activeInvoiceId,inv=>({flags:{...(inv.flags||{}),[i]:null},damagedQty:{...(inv.damagedQty||{}),[i]:0},damagePhotos:{...(inv.damagePhotos||{}),[i]:[]}}));}else setDamageModal({item,index:i,prefillCount:null}); }}
                                style={{padding:"3px 9px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",border:`1px solid ${flag==="damaged"?RED:"#ddd"}`,background:flag==="damaged"?"#fdf0ee":"white",color:flag==="damaged"?RED:"#888",fontFamily:"inherit",display:"flex",alignItems:"center",gap:4}}>
                                🔴 Damaged{flag==="damaged"&&<span style={{fontSize:10}}>({damagedQty[i]||0}{photoCount>0?` · ${photoCount}📷`:""})</span>}
                              </button>
                              {[["short","🟡 Short",AMBER,"#fdf4eb"],["wrong","🔵 Wrong",BLUE,"#edf3f9"]].map(([type,label,col,bg])=>(
                                <button key={type} onClick={()=>toggleFlag(i,type)} style={{padding:"3px 9px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",border:`1px solid ${flag===type?col:"#ddd"}`,background:flag===type?bg:"white",color:flag===type?col:"#888",fontFamily:"inherit"}}>{label}</button>
                              ))}
                            </div>
                          </td>
                          <td style={td}>
                            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:13}}>
                              <input type="checkbox" checked={!!specials[i]} onChange={e=>toggleSpecial(i,e.target.checked)} style={{accentColor:GREEN}}/>
                              {matched?<Badge type="special">Match: {matched.customerName||matched.name}</Badge>:"Mark"}
                            </label>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>

            {manifest.cancelled_items?.length>0&&(
              <div style={card}>
                <div style={cardH}><span style={{fontSize:16,fontWeight:700,color:RED}}>⚠ Cancelled / Backordered</span></div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr>{["Product","Qty","Status"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
                  <tbody>{manifest.cancelled_items.map((item,i)=><tr key={i}><td style={td}>{item.description}</td><td style={{...td,fontFamily:"monospace"}}>{item.ord_qty}</td><td style={td}><Badge type="cancel">Cancelled</Badge></td></tr>)}</tbody>
                </table>
              </div>
            )}
          </>}
        </>}

        {/* ══ SPECIAL ORDERS ══ */}
        {tab==="orders"&&<>
          <div style={card}>
            <div style={cardH}><span style={{fontSize:16,fontWeight:700,color:GREEN}}>Log a Special Order</span></div>
            <div style={{padding:18}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                {[["Customer Name","name","text","e.g. Sarah Martinez"],["Phone","phone","tel","(916) 555-0000"]].map(([label,key,type,ph])=>(
                  <div key={key}><div style={{fontSize:11,fontWeight:600,color:"#555",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.05em"}}>{label}</div><input style={inp} type={type} placeholder={ph} value={soForm[key]} onChange={e=>setSoForm(p=>({...p,[key]:e.target.value}))}/></div>
                ))}
                <div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,fontWeight:600,color:"#555",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.05em"}}>Product Description</div><input style={inp} placeholder="e.g. Orijen Large Breed 25lb" value={soForm.product} onChange={e=>setSoForm(p=>({...p,product:e.target.value}))}/></div>
                <div><div style={{fontSize:11,fontWeight:600,color:"#555",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.05em"}}>Distributor</div><select style={inp} value={soForm.distributor} onChange={e=>setSoForm(p=>({...p,distributor:e.target.value}))}><option>Newco</option><option>VSI</option><option>Phillips</option><option>Other</option></select></div>
                <div><div style={{fontSize:11,fontWeight:600,color:"#555",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.05em"}}>Notes</div><input style={inp} placeholder="Any special instructions" value={soForm.notes} onChange={e=>setSoForm(p=>({...p,notes:e.target.value}))}/></div>
              </div>
              <button style={btn(GREEN,"white")} onClick={addOrder}>+ Add Special Order</button>
            </div>
          </div>
          <div style={card}>
            <div style={cardH}><span style={{fontSize:16,fontWeight:700,color:GREEN}}>Pending Orders</span><span style={{fontSize:12,color:"#888"}}>{pendingOrders.length} pending</span></div>
            <div style={{padding:18}}>
              {orders.length===0?(<div style={{textAlign:"center",padding:"32px 24px",color:"#aaa"}}><div style={{fontSize:32}}>⭐</div><p style={{marginTop:8}}>No special orders logged yet</p></div>)
              :orders.map(o=>(
                <div key={o.id} style={{border:"1px solid #ddd8d0",borderLeft:o.arrived?`3px solid ${GREEN}`:"1px solid #ddd8d0",borderRadius:8,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"space-between",background:"white"}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14}}>{o.name} {o.arrived&&"✅"}</div>
                    <div style={{fontSize:12,color:"#666",marginTop:2}}>{o.product} · {o.distributor} · {o.date}</div>
                    {o.phone&&<div style={{fontFamily:"monospace",fontSize:13,color:BLUE,marginTop:2}}>{o.phone}</div>}
                    {o.notes&&<div style={{fontSize:12,color:"#888",fontStyle:"italic"}}>{o.notes}</div>}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    {!o.arrived&&<button style={btn("white",GREEN,`1px solid ${GREEN}`)} onClick={()=>markArrived(o.id)}>Mark Arrived</button>}
                    <button style={btn("#fdf0ee",RED)} onClick={()=>deleteOrder(o.id)}>Remove</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </>}

        {/* ══ REPORT ══ */}
        {tab==="report"&&<>
          {doneInvoices.length>1&&(
            <div style={{background:"white",border:"1px solid #ddd8d0",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
              <span style={{fontSize:12,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",flexShrink:0}}>Report for:</span>
              {doneInvoices.map(inv=>(
                <button key={inv.id} onClick={()=>setActiveInvoiceId(inv.id)}
                  style={{padding:"5px 12px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",
                    background:inv.id===activeInvoiceId?VENDOR_COLORS[inv.vendor]||GREEN:"white",
                    color:inv.id===activeInvoiceId?"white":"#555",
                    border:`1px solid ${inv.id===activeInvoiceId?VENDOR_COLORS[inv.vendor]||GREEN:"#ddd"}`,fontFamily:"inherit"}}>
                  {inv.parsed?.distributor||inv.vendor} #{inv.parsed?.invoice_number}
                </button>
              ))}
            </div>
          )}
          {!activeReport?(
            <div style={{textAlign:"center",padding:"48px 24px",color:"#888"}}>
              <div style={{fontSize:36}}>📋</div><h3 style={{marginTop:10}}>No report yet</h3>
              <p style={{marginTop:6}}>Go to Check-In and click Generate Report</p>
              <button style={{...btn(GREEN,"white"),marginTop:16}} onClick={()=>setTab("checkin")}>← Go to Check-In</button>
            </div>
          ):<>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
              <div>
                <div style={{fontSize:22,fontWeight:800,color:GREEN}}>Delivery Report</div>
                <div style={{fontSize:12,color:"#888"}}>{activeReport.invoiceLabel||`Invoice #${manifest?.invoice_number}`} · {manifest?.distributor} · {manifest?.ship_date} · {activeReport.today}</div>
              </div>
              <button style={btn("white",GREEN,`1px solid ${GREEN}`)} onClick={()=>window.print()}>🖨 Print</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:18}}>
              {[["Items",activeReport.items.length,GREEN],["Issues",activeReport.flaggedItems.length,AMBER],["Special Orders",activeReport.specialItems.length,BLUE],["Cancelled",activeReport.cancelled.length,"#888"],["Price Changes",activeReport.priceChanges.length,"#b8860b"]].map(([label,val,color])=>(
                <div key={label} style={{background:"white",border:"1px solid #ddd8d0",borderRadius:10,padding:12,textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.05)"}}>
                  <div style={{fontSize:24,fontWeight:800,color}}>{val}</div>
                  <div style={{fontSize:10,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.06em",marginTop:3}}>{label}</div>
                </div>
              ))}
            </div>
            {activeReport.specialItems.length>0&&(
              <div style={{...card,overflow:"hidden"}}>
                <div style={{background:BLUE,color:"white",padding:"10px 14px",fontSize:13,fontWeight:600}}>📞 Call List — Special Orders Arrived</div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr>{["Customer","Phone","Product","Notes"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
                  <tbody>{activeReport.specialItems.map(({item,i})=>{
                    const m=orders.find(o=>o.product.toLowerCase().split(" ").some(w=>w.length>3&&item.description.toLowerCase().includes(w)));
                    return<tr key={i}><td style={{...td,fontWeight:600}}>{m?.customerName||m?.name||"—"}</td><td style={{...td,fontFamily:"monospace",color:BLUE}}>{m?.phone||"—"}</td><td style={td}>{item.description}</td><td style={td}>{m?.notes||"—"}</td></tr>;
                  })}</tbody>
                </table>
              </div>
            )}
            <div style={{...card,overflow:"hidden"}}>
              <div style={{background:GREEN,color:"white",padding:"10px 14px",fontSize:13,fontWeight:600}}>📦 Shelf Stock — Put Away</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr>{["Product","Invoice Qty","Received","Status","⚠ Staff Notes"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
                <tbody>{activeReport.shelfItems.map(({item,i,flag,actualQty,checkedIn:ci})=>{
                  const priceChange=(activeReport.priceChanges||[]).find(pc=>pc.upc===item.upc);
                  return(
                    <tr key={i}>
                      <td style={td}><div style={{fontWeight:600}}>{item.description}</div><div style={{fontFamily:"monospace",fontSize:11,color:"#aaa"}}>{item.upc}</div></td>
                      <td style={{...td,fontFamily:"monospace"}}>{item.ship_qty}</td>
                      <td style={{...td,fontFamily:"monospace",fontWeight:700,color:ci?(actualQty<parseInt(item.ship_qty)?RED:actualQty>parseInt(item.ship_qty)?PURPLE:GREEN):"#aaa"}}>{ci?actualQty:"—"}</td>
                      <td style={td}>{flag==="extra"?<Badge type="extra">+{actualQty-parseInt(item.ship_qty)} extra</Badge>:flag?<Badge type={flag}>⚠ {flag}</Badge>:<Badge type="ok">OK</Badge>}</td>
                      <td style={td}>
                        {flag==="extra"&&<span style={{fontSize:11,color:PURPLE,fontWeight:600}}>📦 Extra units — add to inventory count</span>}
                        {priceChange&&<span style={{fontSize:11,color:"#b8860b",fontWeight:700,background:"#fff8e1",padding:"2px 8px",borderRadius:6}}>💰 PRICE CHANGE: was ${priceChange.previous} → now ${priceChange.current} (+${priceChange.change}) — DO NOT SHELVE until price is updated</span>}
                      </td>
                    </tr>
                  );
                })}</tbody>
              </table>
            </div>
            {activeReport.flaggedItems.filter(x=>x.flag!=="extra").length>0&&<>
              <div style={{...card,overflow:"hidden"}}>
                <div style={{background:AMBER,color:"white",padding:"10px 14px",fontSize:13,fontWeight:600}}>⚠ Issues — Vendor Report</div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                  <thead><tr>{["Product","Issue","Invoice Qty","Detail","Photos"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
                  <tbody>{activeReport.flaggedItems.filter(x=>x.flag!=="extra").map(({item,i,flag,actualQty,checkedIn:ci,dmgCount,photos})=>(
                    <tr key={i}>
                      <td style={td}>{item.description}</td>
                      <td style={td}><Badge type={flag}>{flag.charAt(0).toUpperCase()+flag.slice(1)}</Badge></td>
                      <td style={{...td,fontFamily:"monospace"}}>{item.ship_qty}</td>
                      <td style={{...td,fontSize:12,color:RED}}>{flag==="damaged"?`${dmgCount} of ${item.ship_qty} damaged`:flag==="short"?(ci?`received ${actualQty}`:"short"):"wrong item"}</td>
                      <td style={td}>{photos?.length>0?(<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{photos.map((src,pi)=><img key={pi} src={src} style={{width:40,height:40,objectFit:"cover",borderRadius:6,border:"1px solid #ddd",cursor:"pointer"}} onClick={()=>window.open(src,"_blank")} alt="damage"/>)}</div>):<span style={{color:"#aaa",fontSize:12}}>None</span>}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
              <div style={{fontSize:16,fontWeight:800,color:GREEN,marginBottom:10}}>📧 Vendor Exception Email</div>
              <div style={{background:"white",border:"1px solid #ddd8d0",borderRadius:10,overflow:"hidden",marginBottom:16}}>
                <div style={{background:"#faf8f4",borderBottom:"1px solid #ddd8d0",padding:"12px 18px"}}>
                  {[["To",(VENDORS[manifest?.distributor]||VENDORS["Other"]).repEmail||"rep@vendor.com"],["From","orders@foothillfeedloomis.com"],["Subject",`Delivery Exception — Foothill Feed — ${activeReport.today}`]].map(([label,val])=>(
                    <div key={label} style={{display:"flex",gap:10,marginBottom:5,fontSize:13}}><span style={{color:"#aaa",width:55}}>{label}:</span><span>{val}</span></div>
                  ))}
                </div>
                <div style={{padding:18,fontFamily:"monospace",fontSize:12,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{activeReport.vendorEmail}</div>
                {activeReport.flaggedItems.some(x=>x.photos?.length>0)&&(
                  <div style={{padding:"0 18px 18px"}}>
                    <div style={{fontSize:12,fontWeight:600,color:"#555",marginBottom:8}}>📎 Photos to attach:</div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {activeReport.flaggedItems.flatMap(({item,photos})=>(photos||[]).map((src,pi)=>(
                        <div key={`${item.upc}-${pi}`} style={{textAlign:"center"}}>
                          <img src={src} style={{width:72,height:72,objectFit:"cover",borderRadius:8,border:"1px solid #ddd",display:"block",cursor:"pointer"}} onClick={()=>window.open(src,"_blank")} alt="damage"/>
                          <div style={{fontSize:10,color:"#aaa",marginTop:2,maxWidth:72,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.description.split(" ").slice(0,2).join(" ")}</div>
                        </div>
                      )))}
                    </div>
                  </div>
                )}
              </div>
              <button style={btn(AMBER,"white")} onClick={()=>{navigator.clipboard.writeText(activeReport.vendorEmail);alert("Vendor email copied!");}}>📋 Copy Vendor Email</button>
              <button style={{...btn("white","#b8860b",`1px solid #b8860b`),marginLeft:8}} onClick={()=>setShareModal(true)}>📱 Add Photos on iPad</button>
            </>}
            {activeReport.priceChanges.length>0&&<>
              <div style={{fontSize:16,fontWeight:800,color:"#b8860b",marginTop:20,marginBottom:10}}>💰 Price Change Email — To You</div>
              <div style={{background:"white",border:"1px solid #f0c040",borderRadius:10,overflow:"hidden",marginBottom:12}}>
                <div style={{background:"#fff8e1",borderBottom:"1px solid #f0c040",padding:"12px 18px"}}>
                  {[["To","jeff@foothillfeedloomis.com"],["From","orders@foothillfeedloomis.com"],["Subject",`⚠ Price Increases — Update Before Shelving — ${activeReport.today}`]].map(([label,val])=>(
                    <div key={label} style={{display:"flex",gap:10,marginBottom:5,fontSize:13}}><span style={{color:"#aaa",width:55}}>{label}:</span><span>{val}</span></div>
                  ))}
                </div>
                <div style={{padding:18,fontFamily:"monospace",fontSize:12,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{activeReport.priceEmail}</div>
              </div>
              <button style={{...btn("#b8860b","white"),marginBottom:20}} onClick={()=>{navigator.clipboard.writeText(activeReport.priceEmail);alert("Price change email copied!");}}>📋 Copy Price Change Email</button>
            </>}
          </>}
        </>}

        {/* ══ CREDITS LOG ══ */}
        {tab==="credits"&&<>
          <div style={{...card,overflow:"hidden"}}>
            <div style={{...cardH,background:"#e8f4f8",borderBottom:"1px solid #b8dce8"}}>
              <div>
                <span style={{fontSize:16,fontWeight:700,color:"#2c6e8a"}}>💳 Vendor Credit Log</span>
                <div style={{fontSize:12,color:"#4a7f96",marginTop:3}}>Credit memos logged here automatically · Never processed as deliveries</div>
              </div>
              {creditLog.length>0&&(
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:22,fontWeight:800,color:"#2c6e8a",fontFamily:"monospace"}}>${creditLog.reduce((sum,c)=>sum+parseFloat(c.total||0),0).toFixed(2)}</div>
                  <div style={{fontSize:11,color:"#7aabbc"}}>total credits logged</div>
                </div>
              )}
            </div>
            {creditLog.length===0?(
              <div style={{textAlign:"center",padding:"48px 24px",color:"#aaa"}}>
                <div style={{fontSize:36,marginBottom:12}}>💳</div>
                <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>No credits logged yet</div>
                <div style={{fontSize:13}}>Credit memos from Newco, VSI, or Phillips will appear here automatically when uploaded</div>
              </div>
            ):(
              <div style={{padding:16}}>
                {creditLog.map(entry=>(
                  <div key={entry.id} style={{border:"1px solid #b8dce8",borderRadius:10,marginBottom:12,overflow:"hidden"}}>
                    <div style={{background:"#f0f8fc",borderBottom:"1px solid #b8dce8",padding:"11px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div>
                        <div style={{fontWeight:700,fontSize:14,color:"#2c6e8a"}}>{entry.vendor} — Invoice #{entry.invoice_number}</div>
                        <div style={{fontSize:11,color:"#7aabbc",marginTop:2}}>{entry.date} · Logged {new Date(entry.loggedAt).toLocaleDateString()}{entry.program&&<span> · Program: <strong>{entry.program}</strong></span>}</div>
                      </div>
                      <div style={{fontFamily:"monospace",fontWeight:800,fontSize:18,color:"#2c6e8a"}}>${entry.total}</div>
                    </div>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead><tr>{["Product","UPC","Qty","Net","Amount"].map(h=><th key={h} style={{...th,background:"#4a90a4",fontSize:10}}>{h}</th>)}</tr></thead>
                      <tbody>{entry.items.map((item,i)=>(
                        <tr key={i}><td style={td}>{item.description}</td><td style={{...td,fontFamily:"monospace",fontSize:11,color:"#aaa"}}>{item.upc}</td><td style={{...td,fontFamily:"monospace"}}>{item.ship_qty}</td><td style={{...td,fontFamily:"monospace"}}>${item.net_price}</td><td style={{...td,fontFamily:"monospace",fontWeight:700,color:"#2c6e8a"}}>${item.extended}</td></tr>
                      ))}</tbody>
                    </table>
                  </div>
                ))}
                <div style={{textAlign:"center",paddingTop:8}}>
                  <button onClick={()=>{if(window.confirm("Clear all credit log entries?")){setCreditLog([]);localStorage.removeItem("ff_credit_log");}}} style={{...btn("white",RED,"1px solid "+RED),fontSize:12}}>🗑 Clear Credit Log</button>
                </div>
              </div>
            )}
          </div>
          <div style={{...card,padding:16,background:"#f0f8fc",border:"1px solid #b8dce8"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#2c6e8a",marginBottom:6}}>🔮 Coming Soon: Credit Reconciliation</div>
            <div style={{fontSize:12,color:"#4a7f96",lineHeight:1.6}}>Future feature: Log Astro loyalty submissions → auto-match to credit memos received → flag any outstanding credits past 30 days.</div>
          </div>
        </>}

      </div>
    </div>
